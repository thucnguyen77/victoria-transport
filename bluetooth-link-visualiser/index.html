
<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>Transport Victoria - Bluetooth Link Visualiser</title>
	
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

	<style>
		html, body {
			height: 100%;
			margin: 0;
			display: flex;
			flex-direction: column;
		}
		#app-container {
			display: flex;
			flex: 1;
			overflow: hidden;
		}
		#map {
			flex: 1;
			height: 100%;
			min-width: 0;
		}
		#resizer {
			width: 5px;
			flex-shrink: 0;
			cursor: col-resize;
			background: #e5e7eb;
			position: relative;
			transition: background 0.15s;
			z-index: 10;
		}
		#resizer:hover,
		#resizer.dragging {
			background: #78be20;
		}
		#resizer::after {
			content: '';
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			height: 32px;
			width: 3px;
			border-left: 1px dotted #9ca3af;
			border-right: 1px dotted #9ca3af;
		}
	</style>
	
</head>
<body>
<div id="app-container">
	<div id="map"></div>
	<div id="resizer"></div>
	<div id="side-panel" style="width:220px" class="min-w-[150px] max-w-[600px] bg-gray-50 border-l border-gray-200 flex flex-col shadow-inner overflow-hidden">
		<!-- Controls -->
		<div class="flex flex-col flex-shrink-0 px-4 py-5 gap-3">
			<h3 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-0">API Settings</h3>
			
			<label class="text-xs font-semibold text-gray-600 block -mb-1" for="api-key-input">API Key</label>
			<input id="api-key-input" type="password" placeholder="Enter API key…" value=""
				class="w-full px-2 py-1.5 text-xs font-mono border border-gray-300 rounded-md bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#78be20] focus:border-transparent transition" />
			<p class="text-[10px] text-gray-400 -mt-1">Get an API key from the <a href="https://opendata.transport.vic.gov.au" target="_blank" rel="noopener noreferrer" class="text-[#78be20] underline hover:opacity-75">Transport Victoria Open Data Portal</a>.</p>
			<label class="text-xs font-semibold text-gray-600 block -mb-1" for="refresh-interval-input">Refresh interval (s)</label>
			<div class="flex items-center gap-2">
				<input id="refresh-interval-input" type="number" min="1" max="300" value="60"
					class="flex-1 min-w-0 px-2 py-1.5 text-xs border border-gray-300 rounded-md bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#78be20] focus:border-transparent transition" />
				<button id="btn-toggle"
					class="px-3 py-1.5 text-sm font-semibold rounded-md text-white bg-[#78be20] hover:opacity-90 transition-opacity cursor-pointer whitespace-nowrap">&#9654; Start</button>
			</div>
			<div id="refresh-status" class="text-xs text-gray-500 mt-1">Please enter API key.</div>
		</div>
		<!-- Features table -->
		<div class="flex flex-col flex-1 min-h-0 border-t border-gray-200">
			<h3 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest flex-shrink-0 px-4 py-2">Vehicles <span id="features-count" class="normal-case font-normal text-gray-400"></span></h3>
			<div class="overflow-auto flex-1 min-h-0">
				<table id="features-table" class="w-full text-[10px] text-gray-700 border-collapse">
					<thead class="sticky top-0 bg-gray-100 z-10">
						<tr>
							<th class="px-2 py-1 text-left font-semibold text-gray-500 border-b border-gray-200 whitespace-nowrap">ID</th>
							<th class="px-2 py-1 text-left font-semibold text-gray-500 border-b border-gray-200 whitespace-nowrap">Name</th>
							<th class="px-2 py-1 text-left font-semibold text-gray-500 border-b border-gray-200 whitespace-nowrap">Length</th>
							<th class="px-2 py-1 text-left font-semibold text-gray-500 border-b border-gray-200 whitespace-nowrap">Direction</th>
                            <th class="px-2 py-1 text-left font-semibold text-gray-500 border-b border-gray-200 whitespace-nowrap">Speed</th>
							<th class="px-2 py-1 text-left font-semibold text-gray-500 border-b border-gray-200 whitespace-nowrap">Start</th>
						</tr>
					</thead>
					<tbody id="features-tbody"></tbody>
				</table>
			</div>
		</div>
	</div>
</div>
<script>

	const map = L.map('map', {
        zoomSnap: 0.25
    }
    ).setView([-37.814, 144.963], 13); // Melbourne CBD coordinates

	const tiles = L.tileLayer('https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png', {
		maxZoom: 20,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

    function forEachFeature(feature, layer) {
        var popupContent = '<b>'+ feature.properties.id + ': ' + feature.properties.name +'</b><br>Length: ' + feature.properties.length + ' (m)<br>Direction: ' + feature.properties.direction + '<br>Speed: ' + feature.properties.speed + ' (km/h)';
        layer.bindPopup(popupContent);
    };

    function getColorBySpeed(speed) {
        if (speed <= 50) {
            return 'red';
        }
        if (speed > 50 && speed < 80) {
            return 'green';
        }
        else {
            return 'blue';
        }
    }

    function featureStyle(feature) {
        return {
            color: getColorBySpeed(feature.properties.speed)
        };
    }

    var geojson = L.geoJSON(null, {
        onEachFeature: forEachFeature,
        style: featureStyle
    });

    // Convert an array of GTFS objects to GeoJSON "Features" array (https://tools.ietf.org/html/rfc7946#section-3.2)
    const arrayToGeojsonFeatures = (objArray) => {
    return objArray.map((obj) => {
        // console.log("obj", obj);
        return {
        type: "Feature",
        properties: {
            // Depending on your data source, the properties available on "obj" may be different:
            id: obj.id,
            name: obj.name,
            length: obj.length,
            direction: obj.direction,
            speed: obj.latest_stats.speed,
            startTime: obj.latest_stats.interval_start
        },
        geometry: {
            type: "LineString",
            coordinates: obj.coordinates
        }
        };
    });
    };

    function getApiUrl() {
        return 'https://api.opendata.transport.vic.gov.au/opendata/roads/bluetooth-travel-time/v1/links_geometry';
    }

    async function fetchAndUpdateMap() {
        const apiKey = document.getElementById('api-key-input').value.trim();
        if (!apiKey) {
            document.getElementById('refresh-status').textContent = 'Please enter API key.';
            return;
        }
        try {
            document.getElementById('refresh-status').textContent = 'Fetching data...';
            const response = await fetch(getApiUrl(), {
                headers: { 'KeyId': apiKey }
            });
            if (!response.ok) {
                console.error('API request failed:', response.status, response.statusText);
                stopRefresh();
                document.getElementById('refresh-status').textContent = 'Error: ' + response.status + ' ' + response.statusText;
                return;
            }
            const responseData = await response.json();
            const featureCollection = {
                type: 'FeatureCollection',
                features: arrayToGeojsonFeatures(responseData)
            };
            geojson.clearLayers();
            geojson.addData(featureCollection);
            if (!map.hasLayer(geojson)) {
                geojson.addTo(map);
            }
            document.getElementById('refresh-status').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
            updateFeaturesTable(featureCollection.features);
        } catch (error) {
            console.error('Error fetching vehicle positions:', error);
            stopRefresh();
            document.getElementById('refresh-status').textContent = 'Error: ' + error.message;
        }
    }

    // Refresh interval management
    let refreshInterval = null;

    function getRefreshMs() {
        const val = parseFloat(document.getElementById('refresh-interval-input').value);
        return (isFinite(val) && val >= 1 ? val : 3) * 1000;
    }

    function startRefresh() {
        if (refreshInterval) return;
        document.getElementById('refresh-status').textContent = 'Refresh started: ' + new Date().toLocaleTimeString();
        fetchAndUpdateMap();
        refreshInterval = setInterval(fetchAndUpdateMap, getRefreshMs());
        const btn = document.getElementById('btn-toggle');
        btn.innerHTML = '&#9646;&#9646; Stop';
        btn.classList.remove('bg-[#78be20]');
        btn.classList.add('bg-red-500');
    }

    function stopRefresh() {
        if (!refreshInterval) return;
        clearInterval(refreshInterval);
        refreshInterval = null;
        const btn = document.getElementById('btn-toggle');
        btn.innerHTML = '&#9654; Start';
        btn.classList.remove('bg-red-500');
        btn.classList.add('bg-[#78be20]');
        document.getElementById('refresh-status').textContent = 'Refresh stopped: ' + new Date().toLocaleTimeString();
    }

    document.getElementById('btn-toggle').addEventListener('click', () => {
        if (refreshInterval) stopRefresh(); else startRefresh();
    });
    document.getElementById('api-key-input').addEventListener('change', startRefresh);
    document.getElementById('refresh-interval-input').addEventListener('change', startRefresh);
    
    function updateFeaturesTable(features) {
        const tbody = document.getElementById('features-tbody');
        tbody.innerHTML = '';
        document.getElementById('features-count').textContent = features.length ? '(' + features.length + ')' : '(No data)';
        const cellClass = 'px-2 py-1 border-b border-gray-100 whitespace-nowrap';
        features.forEach((f) => {
            const [lon, lat] = f.geometry.coordinates;
            const p = f.properties;
            const tr = document.createElement('tr');
            tr.className = 'even:bg-white odd:bg-gray-50 hover:bg-green-50 transition-colors cursor-pointer';
            [p.id, p.name, p.length, p.direction, p.speed, p.startTime].forEach((val) => {
                const td = document.createElement('td');
                td.className = cellClass;
                td.textContent = val ?? '';
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    // Resizable side panel
    const resizer = document.getElementById('resizer');
    const sidePanel = document.getElementById('side-panel');
    const PANEL_MIN = 150;
    const PANEL_MAX = 600;

    resizer.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        resizer.classList.add('dragging');
        resizer.setPointerCapture(e.pointerId);
        const startX = e.clientX;
        const startWidth = sidePanel.offsetWidth;

        function onMove(e) {
            const newWidth = Math.min(PANEL_MAX, Math.max(PANEL_MIN, startWidth + (startX - e.clientX)));
            sidePanel.style.width = newWidth + 'px';
            map.invalidateSize();
        }
        function onUp() {
            resizer.classList.remove('dragging');
            resizer.removeEventListener('pointermove', onMove);
            resizer.removeEventListener('pointerup', onUp);
        }
        resizer.addEventListener('pointermove', onMove);
        resizer.addEventListener('pointerup', onUp);
    });

    // Start automatically on load
    //startRefresh();

</script>

</div><!-- #app-container -->
</body>
</html>
